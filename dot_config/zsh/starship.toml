"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = "$os$directory$git_branch$git_status$character"

right_format = "$aws"

palette = "catppuccin_mocha"

[directory]
style             = "fg:flamingo bg:surface0"
format            = "[ $path ]($style)"
truncation_length = 4
truncate_to_repo  = true

[os]
disabled = false
style = "bg:base fg:rosewater"
format = '[](base)[$symbol ]($style)[](fg:base bg:surface0)'

[os.symbols]
Ubuntu  = "󰕈"
Artix   = "󰣇"
Arch    = "󰣇"
CachyOS = "󰣇"
Macos   = ""

[git_branch]
symbol = ""
format = "[](fg:surface0 bg:surface1)[ $symbol $branch ](fg:pink bg:surface1)"

[git_status]
format     = "[($ahead_behind$staged$modified$untracked$deleted$conflicted)](bg:surface1)"
ahead      = "[⇡$count ](fg:teal bg:surface1)"
behind     = "[⇣$count ](fg:sky bg:surface1)"
diverged   = "[⇡$ahead_count⇣$behind_count ](fg:mauve bg:surface1)"
staged     = "[+$count ](fg:green bg:surface1)"
modified   = "[●$count ](fg:yellow bg:surface1)"
untracked  = "[?$count ](fg:peach bg:surface1)"
deleted    = "[✘$count ](fg:maroon bg:surface1)"
conflicted = "[⚡$count ](fg:red bg:surface1)"

[character]
success_symbol = "[](surface2)"
error_symbol   = "[](red)"
vimcmd_symbol  = "[](sky)"

[aws]
format = '$symbol[ $profile]($style)[](fg:surface1 bg:surface2)[ $region ](fg:mauve bg:surface2)'
style = 'bg:surface1 fg:rosewater'
symbol = '[  ](fg:peach bg:surface0)[](fg:surface0 bg:surface1)'

[aws.region_aliases]
ap-southeast-2 = 'AU'
us-east-1 = 'VA'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
